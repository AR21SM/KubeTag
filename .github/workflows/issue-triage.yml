name: KubeTag Issue Triage

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read

concurrency:
  group: kubetag-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate KubeTag App token
        id: kubetag-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.KUBETAG_APP_CLIENT_ID }}
          private-key: ${{ secrets.KUBETAG_APP_PRIVATE_KEY }}
          permission-issues: write
          permission-metadata: read

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run KubeTag
        env:
          GITHUB_TOKEN: ${{ steps.kubetag-token.outputs.token }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          PREDICTOR_BACKEND: development
          MODEL_DIR: artifacts/model
          APPLY_LABELS: "true"
          ALLOW_DEVELOPMENT_WRITES: "true"
          LOG_LEVEL: INFO
          REQUEST_TIMEOUT_SECONDS: "30"
        run: uv run python -m kubetag
