name: KubeTag Issue Triage

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read

concurrency:
  group: kubetag-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate KubeTag App token
        id: kubetag-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.KUBETAG_APP_CLIENT_ID }}
          private-key: ${{ secrets.KUBETAG_APP_PRIVATE_KEY }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run KubeTag
        env:
          GITHUB_TOKEN: ${{ steps.kubetag-token.outputs.token }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          PREDICTOR_BACKEND: development
          MODEL_DIR: artifacts/model
        run: uv run python -m kubetag
